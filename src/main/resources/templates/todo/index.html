<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(title=~{::title}, content=~{::main})}">
<head>
  <title>Todo | App Template</title>
</head>
<body>
<main>
  <div class="app-content-panel p-4 sm:p-6">
    <div class="mx-auto max-w-3xl">
      <div class="mb-6">
        <h1 class="text-2xl font-semibold tracking-[-0.03em] text-[#2e342f]">My tasks</h1>
        <p class="mt-1 text-sm text-[#6f8397]">A simple list for what needs to get done.</p>
      </div>

      <form
          class="rounded-[24px] border border-black/6 bg-white p-4 shadow-[0_12px_28px_rgba(57,65,58,0.05)]"
          hx-post="/todo/items"
          hx-target="#todo-board"
          hx-swap="outerHTML settle:220ms"
          hx-on::after-request="if(event.detail.successful){ this.reset() }"
      >
        <input
            name="title"
            type="text"
            placeholder="Add a task"
            class="w-full border-0 bg-transparent px-1 py-2 text-base text-[#2e342f] outline-none placeholder:text-[#8a98a5]"
            required>
        <div class="mt-3 grid gap-3 border-t border-black/6 pt-3 sm:grid-cols-[1fr_140px_auto]">
          <input
              name="description"
              type="text"
              placeholder="Details"
              class="app-input !rounded-[14px] !px-3 !py-2.5 !text-sm !shadow-none">
          <select name="priority" class="app-input !rounded-[14px] !px-3 !py-2.5 !text-sm !shadow-none">
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
          <button type="submit" class="app-primary-btn !min-w-24 !px-4 !py-2.5">
            Add
          </button>
        </div>
      </form>

      <th:block th:replace="~{todo/fragments :: board}"></th:block>
    </div>
  </div>
</main>
</body>
</html>
