<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)"
      th:with="head=${head?:null}, scripts=${scripts?:null}">

<head>
  <th:block th:replace="${title}"></th:block>
  <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon"/>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no"/>
  <meta name="_ctx" th:content="@{/}"/>

  <vite:react-refresh></vite:react-refresh>
  <vite:client></vite:client>
  <vite:vite>
    <vite:entry value="/css/application.css"></vite:entry>
    <vite:entry value="/css/styles.css"></vite:entry>
  </vite:vite>
  <th:block th:if="${head != null}">
    <th:block th:replace="${head}"></th:block>
  </th:block>
</head>

<body class="app-shell" x-data="{ open: true, mobileOpen: false }" x-cloak>
<div class="app-layer">
<div class="lg:hidden">
  <div x-show="mobileOpen"
       x-transition:enter="transition-opacity duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition-opacity duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-[55] bg-black/40"
       @click="mobileOpen = false"
       style="display:none">
  </div>
  <aside x-show="mobileOpen"
         x-transition:enter="transition-transform duration-200"
         x-transition:enter-start="-translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition-transform duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="-translate-x-full"
         class="app-sidebar fixed left-0 top-0 z-[60] h-full w-60 shadow-xl"
         style="display:none">
    <th:block th:replace="~{fragments/menu :: menu}"/>
  </aside>
</div>
<header class="app-topbar">
  <div class="flex items-center gap-2">
    <button
        class="flex h-10 w-10 items-center justify-center rounded-full bg-[#fff1f3] text-[var(--color-accent)] cursor-pointer hover:bg-[#ffe3e8] focus:outline-none transition-colors lg:hidden"
        @click="mobileOpen = !mobileOpen"
        aria-label="open menu">
      <svg width="24" height="18" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 8.99976H24" stroke="currentColor" stroke-width="2"/>
        <path d="M0 17H24" stroke="currentColor" stroke-width="2"/>
        <path d="M0 1H24" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>
    <button
        class="hidden h-10 w-10 items-center justify-center rounded-full bg-[#fff1f3] text-[var(--color-accent)] cursor-pointer hover:bg-[#ffe3e8] focus:outline-none transition-colors lg:flex"
        @click="open = !open"
        aria-label="toggle sidebar">
      <svg width="24" height="18" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 8.99976H24" stroke="currentColor" stroke-width="2"/>
        <path d="M0 17H24" stroke="currentColor" stroke-width="2"/>
        <path d="M0 1H24" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>
    <a th:href="@{/}" class="flex items-center gap-3 cursor-pointer">
      <span class="flex h-9 w-9 items-center justify-center rounded-2xl bg-[linear-gradient(135deg,#ff5d74,#ff2442)] text-sm font-bold text-white shadow-[0_10px_22px_rgba(255,36,66,0.22)]">R</span>
      <div>
        <span class="app-brand block">App Template</span>
        <span class="block text-xs text-[#777]">Dashboard and tasks</span>
      </div>
    </a>
  </div>
  <div class="ml-auto hidden lg:flex items-center gap-3 relative" x-data="{ userMenuOpen: false }" @click.outside="userMenuOpen = false">
    <button class="app-user-trigger" @click="userMenuOpen = !userMenuOpen">
      <span class="app-avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#536b5f"/>
          <g clip-path="url(#clip0_128_3157)">
            <path
                d="M12 13.824C13.1139 13.824 14.0739 13.428 14.8619 12.636C15.6589 11.844 16.0573 10.899 16.0573 9.79201C16.0573 8.68501 15.6589 7.73101 14.8619 6.94801C14.0649 6.16501 13.1139 5.76001 12 5.76001C10.886 5.76001 9.92602 6.15601 9.1381 6.94801C8.35017 7.74001 7.94263 8.68501 7.94263 9.79201C7.94263 10.899 8.34112 11.853 9.1381 12.636C9.93508 13.428 10.886 13.824 12 13.824Z"
                fill="white"/>
            <path
                d="M11.9999 20.1601C14.8709 20.1601 17.4429 18.9001 19.1999 16.9111C18.9916 16.7041 18.7562 16.5331 18.4935 16.3981C17.4429 15.8761 16.3833 15.4891 15.2965 15.2281C14.2097 14.9671 13.1139 14.8411 11.9999 14.8411C10.886 14.8411 9.78106 14.9671 8.70332 15.2281C7.62559 15.4891 6.55691 15.8761 5.50634 16.3981C5.2437 16.5331 5.00823 16.7131 4.79993 16.9111C6.55691 18.9001 9.12898 20.1601 11.9999 20.1601Z"
                fill="white"/>
          </g>
          <defs>
            <clipPath id="clip0_128_3157">
              <rect width="14.4" height="14.4" fill="white" transform="translate(4.79993 5.76001)"/>
            </clipPath>
          </defs>
        </svg>
      </span>
      <span class="text-sm font-medium" th:text="${loginUserName}"></span>
    </button>
    <div x-show="userMenuOpen"
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         style="display:none"
         class="app-dropdown">
      <button type="button"
              class="app-dropdown-link w-full"
              hx-get="/logout/dialog"
              hx-target="#modal-content"
              hx-swap="innerHTML"
              hx-on::after-request="window.dispatchEvent(new CustomEvent('open-modal'))"
              @click="userMenuOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    </div>
  </div>
</header>
<div class="app-page-wrap">
  <aside
      class="app-sidebar fixed left-0 top-[var(--layout-header-h)] h-[calc(100vh-var(--layout-header-h))] w-[var(--layout-sidebar-w)] hidden lg:block transition-transform duration-200"
      :class="open ? 'translate-x-0 shadow-[0_8px_24px_rgba(0,0,0,0.18)]' : '-translate-x-full shadow-none'">
    <th:block th:replace="~{fragments/menu :: menu}"/>
  </aside>
  <main
      class="app-main"
      :class="open ? 'lg:ml-[calc(var(--layout-sidebar-w)+0.5rem)]' : 'lg:ml-2'">
    <th:block th:replace="${content}"></th:block>
  </main>
</div>

<dialog id="global-modal"
        class="modal"
        x-data="{ open: false }"
        :class="{ 'modal-open': open }"
        @open-modal.window="open = true"
        @close-modal.window="open = false">
  <div class="modal-box !w-full !max-w-[560px] !bg-transparent !p-0 !shadow-none">
    <div id="modal-content" th:insert="~{fragments/modal :: content}"></div>
  </div>
  <form method="dialog" class="modal-backdrop" @click="open = false" @keydown.escape="open = false">
    <button aria-label="close"></button>
  </form>
</dialog>

<script defer th:src="@{/webjars/alpinejs/dist/cdn.min.js}"></script>
<script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
<script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script>
  function showModal(code, message) {
    $("#error-code").text(code);
    $("#error-message").text(message);
    window.dispatchEvent(new CustomEvent("open-modal"));
  }
</script>
<th:block th:if="${scripts != null}">
  <th:block th:replace="${scripts}"></th:block>
</th:block>

</div>
</body>
</html>
